[[language]]
name = "nix"
language-servers = ["nil", "copilot", "senimels-code"]
auto-format = true

[language.formatter]
args = ["--width=300"]
command = "nixfmt"

[[language]]
name = "lua"
language-servers = ["lua-language-server", "copilot", "senimels-code"]
auto-format = true

[[language]]
name = "typescript"
language-servers = ["typescript-language-server", "copilot", "senimels-code"]
auto-format = true

[[language]]
name = "go"
language-servers = ["gopls", "golangci-lint-lsp", "copilot", "senimels-code"]
auto-format = true

[[language]]
name = "rust"
language-servers = ["rust-analyzer", "senimels-code", "copilot"]
auto-format = true

[language.indent]
tab-width = 2
unit = " "

[[language]]
name = "markdown"
scope = "source.markdown"
file-types = ["md", "markdown"]
language-servers = ["senimels-novel"]

[[language]]
name = "text"
scope = "source.text"
file-types = ["txt", "text"]
language-servers = ["senimels-novel"]

[language-server.senimels-novel]
command = "/home/mapomagpie/code/senime/target/release/senils"
args = ["-t", "/home/mapomagpie/.config/senime/config.toml"]
[language-server.senimels-novel.config]
coding-mode = false

[language-server.senimels-code]
command = "/home/mapomagpie/code/senime/target/release/senils"
args = ["-t", "/home/mapomagpie/.config/senime/config-coding.toml"]

[language-server.senimels-code.config]
trigger-characters = "7ABCDEFGHIJKLMNOPQRSTUVWXYZ ,.abcdefghijklmnopqrstuvwxyz"
comment-prefixes = ["///", "//", "--"]
special-prefix = "!!"

[language-server.copilot]
command = "copilot-language-server"
args = ["--stdio"]

[language-server.copilot.config]
editorInfo = { name = "Helix", version = "25.01" }
editorPluginInfo = { name = "helix-copilot", version = "0.1.0" }

[language-server.nil]
command = "nil"
[language-server.nil.config]
nil.nix.flake = { autoEvalInputs = false, nixpkgsInputName = "nixpkgs",  }
