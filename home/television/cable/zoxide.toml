[metadata]
name = "zoxide"
description = "Browse zoxide directory history"
requirements = ["zoxide"]

[source]
command = "zoxide query -l"
no_sort = true
frecency = false

[preview]
command = "ls -la --color=always '{}'"

[ui]
layout = "portrait"

[keybindings]
ctrl-d = "actions:remove"

[actions.remove]
description = "Remove the selected directory from zoxide"
command = "zoxide remove '{}'"
mode = "fork"
