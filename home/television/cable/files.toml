[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd"]

[source]
command = [
  { name = "Default",     run = "fd -td -tf -tl -d 6 -H -E '.git'" },
  { name = "Directories", run = "fd -td -tl -d 6 -H -E '.git'"     },
]
frecency = false

