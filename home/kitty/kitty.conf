# Shell integration is sourced and configured manually
shell_integration enable no-cursor

allow_remote_control yes
background_opacity 0.800000
cursor #f0c30f
cursor_shape underline
cursor_text_color #f0c30f
pixel_scroll yes

font_family 0xProto Nerd Font Mono
font_size 18

# 霞鹜文楷
symbol_map U+3000-U+30ff,U+4e00-U+9fff LXGW WenKai Mono Medium

cursor_trail 3
cursor_trail_decay 0.1 0.4

map ctrl+shift+t launch --type=tab --cwd=current --copy-env

include ./dank-theme.conf

